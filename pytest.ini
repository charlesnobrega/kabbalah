[pytest]
# Pytest configuration for Kabbalah project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths - only collect from tests/ directory
testpaths = tests

# Minimum Python version
minversion = 7.0

# Add project root and package source directory to Python path
pythonpath =
    .
    src

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    security: Security tests
    performance: Performance tests
    property: Property-based tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (if pytest-cov is installed)
# addopts = --cov=src --cov-report=html --cov-report=term-missing

# Ignore patterns
norecursedirs = 
    .git
    .pytest_cache
    __pycache__
    .venv
    venv
    openclaude
    workspace
    .hypothesis

# Timeout for tests (requires pytest-timeout)
# timeout = 300

# Log configuration
log_cli = false
log_cli_level = INFO
log_file = pytest.log
log_file_level = DEBUG
