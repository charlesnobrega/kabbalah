# Kabbalah Configuration Example

# Provider Configuration Mode
# Options: unified, explicit, hierarchy, hybrid
providers:
  mode: unified
  
  # Unified Mode: Use same provider for all roles
  provider: openai
  model: gpt-3.5-turbo
  
  # Fallback chain if primary provider fails
  fallback:
    - anthropic:claude-3-sonnet
    - google:gemini-pro
    - deepseek:deepseek-chat

